# Multi-block PushT, n_real=5 — see multi_block_pusht_2.yaml for full notes.
dataset:
  num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
  frameskip: 1
  name: multi_block_pusht_n5_train
  keys_to_load:
    - pixels
    - action
    - positions
    - orientations
    - target_positions
    - target_orientations
  keys_to_cache:
    - positions
    - orientations
    - target_positions
    - target_orientations

transform:
  multi_block_pusht_graph:
    n_real: 5
    n_max: 8
    box_size: 224
    action_dim: 2
  skip_normalize:
    - positions
    - orientations
    - target_positions
    - target_orientations
