# Multi-block PushT, n_real=2 — robot pushes 2 rectangular blocks toward
# (x, y, theta) target poses. 2D end-effector velocity action is provided by
# the env, so we list `action` in keys_to_load (unlike bouncing balls).
dataset:
  num_steps: ${eval:'${wm.num_preds} + ${wm.history_size}'}
  frameskip: 1                          # env dt is already 1/30 — no extra skip
  name: multi_block_pusht_n2_train
  keys_to_load:
    - pixels
    - action
    - positions
    - orientations
    - target_positions
    - target_orientations
  keys_to_cache:
    - positions
    - orientations
    - target_positions
    - target_orientations

# MultiBlockPushTGraphTransform handles position normalization (box_size based,
# not z-score), pads positions/orientations from (T, n_real, *) to (T, 8, *),
# and emits `mask` and `target_mask`. The train.py column-normalizer loop must
# skip these keys so its z-score stats don't get applied to the post-transform
# padded tensors.
transform:
  multi_block_pusht_graph:
    n_real: 2
    n_max: 8
    box_size: 224
    action_dim: 2
  skip_normalize:
    - positions
    - orientations
    - target_positions
    - target_orientations
